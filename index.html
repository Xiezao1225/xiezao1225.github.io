<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL CORE | 未来实验室</title>
    <style>
        :root {
            --bg-color: #020205;
            --accent-blue: #00f2ff;
            --accent-purple: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            overflow-x: hidden;
            /* 初始状态隐藏滚动条，等加载完再显示 */
            overflow-y: hidden; 
        }

        /* ================= 1. Loading 动画样式 ================= */
        #loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .loader-content {
            text-align: left;
            width: 300px;
        }

        .loading-text {
            font-family: monospace;
            color: var(--accent-blue);
            font-size: 0.8rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .progress-container {
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .progress-bar {
            position: absolute;
            left: 0; top: 0; height: 100%;
            width: 0%;
            background: var(--accent-blue);
            box-shadow: 0 0 15px var(--accent-blue);
            transition: width 0.4s ease;
        }

        .loader-info {
            margin-top: 15px;
            font-family: monospace;
            color: #444;
            font-size: 0.7rem;
        }

        /* 加载完成后的动画状态 */
        .loaded #loader {
            transform: translateY(-100%);
        }

        /* ================= 2. 基础背景与布局 ================= */
        .bg-lines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: -1;
        }

        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease 0.8s; /* 延迟播放，等屏障拉开 */
        }

        /* 进场后主标题浮现 */
        .loaded header {
            opacity: 1;
            transform: translateY(0);
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 10px;
        }

        /* 此处省略了上一版中提到的 stats-bar, container 等样式（为了保持简洁） */
        /* ... 你可以把之前的样式代码粘贴回这里 ... */

        .section-title { text-align: center; margin: 100px 0 50px; color: var(--accent-blue); letter-spacing: 5px;}

    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="loading-text" id="status-text">INITIALIZING SYSTEM...</div>
            <div class="progress-container">
                <div class="progress-bar" id="progress"></div>
            </div>
            <div class="loader-info">
                NODE_ID: 0x8821 <br>
                ESTABLISHING SECURE PROTOCOL...
            </div>
        </div>
    </div>

    <div class="bg-lines"></div>

    <header>
        <p style="letter-spacing: 5px; color: var(--accent-blue); margin-bottom: 20px;">ACCESS GRANTED</p>
        <h1 class="hero-title">NEURAL CORE</h1>
        <p style="color: #666; margin-top: 20px;">未来的边界，由代码重新定义。</p>
    </header>

    <section>
        <h2 class="section-title">// OUR ARCHITECTS</h2>
        </section>

    <script>
        window.addEventListener('load', () => {
            const progress = document.getElementById('progress');
            const statusText = document.getElementById('status-text');
            let width = 0;

            // 模拟加载进度
            const interval = setInterval(() => {
                if (width >= 100) {
                    clearInterval(interval);
                    statusText.innerText = "SYSTEM READY. ENTERING...";
                    
                    // 延迟一小会儿执行离场动画
                    setTimeout(() => {
                        document.body.classList.add('loaded');
                        document.body.style.overflowY = 'auto'; // 恢复滚动
                    }, 500);
                } else {
                    width += Math.random() * 15;
                    if (width > 100) width = 100;
                    progress.style.width = width + '%';
                    
                    // 随机改变文字增加真实感
                    const messages = ["CONNECTING NODES...", "DECRYPTING ASSETS...", "SYNCING CORE..."];
                    if(width > 40 && width < 45) statusText.innerText = messages[0];
                    if(width > 70 && width < 75) statusText.innerText = messages[1];
                }
            }, 150);
        });
    </script>

</body>
</html>
