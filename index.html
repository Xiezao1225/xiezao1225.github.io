<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL CORE | 未来实验室</title>
    <style>
        :root {
            --bg-color: #020205;
            --accent-blue: #00f2ff;
            --accent-purple: #7000ff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(0, 242, 255, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: var(--bg-color);
            color: #fff;
            font-family: 'Inter', 'Orbitron', sans-serif;
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        /* 动态背景：流动线条 */
        .bg-lines {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                linear-gradient(90deg, var(--bg-color) 21px, transparent 1%) center,
                linear-gradient(var(--bg-color) 21px, transparent 1%) center, #111;
            background-size: 22px 22px;
            opacity: 0.15;
            z-index: -1;
        }

        /* 1. Hero Section */
        header {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, rgba(112, 0, 255, 0.15) 0%, transparent 60%);
        }

        .hero-title {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            background: linear-gradient(to right, #fff, var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 10px;
        }

        /* 2. Data Dashboard (新增加) */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            max-width: 1200px;
            margin: -100px auto 100px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 20px;
        }

        .stat-item h2 { color: var(--accent-blue); font-size: 2.5rem; }
        .stat-item p { font-size: 0.8rem; color: #888; text-transform: uppercase; }

        /* 3. Team Section */
        .section-title {
            text-align: center;
            margin-bottom: 80px;
            font-size: 2.5rem;
            position: relative;
        }

        .section-title::after {
            content: "";
            display: block;
            width: 50px;
            height: 2px;
            background: var(--accent-blue);
            margin: 20px auto;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto 150px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            padding: 0 20px;
        }

        .member-card {
            background: var(--glass);
            border: 1px solid var(--border);
            padding: 40px 30px;
            border-radius: 4px; /* 硬核几何感 */
            transition: 0.4s;
            position: relative;
        }

        .member-card:hover {
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.1);
            border-color: var(--accent-blue);
        }

        .avatar {
            width: 100%;
            aspect-ratio: 1;
            background: #111;
            margin-bottom: 25px;
            clip-path: polygon(10% 0, 100% 0, 100% 90%, 90% 100%, 0 100%, 0 10%);
            border: 1px solid var(--accent-blue);
        }

        /* 4. Timeline / Roadmap (新增加) */
        .timeline {
            max-width: 800px;
            margin: 100px auto;
            padding: 0 20px;
        }

        .timeline-item {
            padding-left: 30px;
            border-left: 1px solid var(--accent-blue);
            padding-bottom: 50px;
            position: relative;
        }

        .timeline-item::before {
            content: "";
            position: absolute;
            left: -6px; top: 0;
            width: 11px; height: 11px;
            background: var(--accent-blue);
            box-shadow: 0 0 10px var(--accent-blue);
        }

        /* 5. CTA Footer */
        footer {
            padding: 100px 20px;
            text-align: center;
            background: linear-gradient(to top, rgba(0, 242, 255, 0.05), transparent);
        }

        .btn-connect {
            padding: 15px 40px;
            background: transparent;
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn-connect:hover {
            background: var(--accent-blue);
            color: #000;
            box-shadow: 0 0 20px var(--accent-blue);
        }
    </style>
</head>
<body>

    <div class="bg-lines"></div>

    <header>
        <p style="letter-spacing: 5px; color: var(--accent-blue); margin-bottom: 20px;">ESTABLISHED 2026</p>
